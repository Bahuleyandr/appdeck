appId: dev.appdeck.app
productName: AppDeck
directories:
  output: dist
files:
  - out/**
  - package.json
asarUnpack:
  - node_modules/better-sqlite3/**
  - node_modules/bindings/**
  - node_modules/file-uri-to-path/**
win:
  target:
    - nsis
    - portable
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
mac:
  target:
    - dmg
linux:
  target:
    - AppImage
    - deb
publish:
  provider: github
  owner: Bahuleyandr
  repo: appdeck
  releaseType: release
