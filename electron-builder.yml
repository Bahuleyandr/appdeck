appId: dev.appdeck.app
productName: AppDeck
directories:
  output: dist
files:
  - out/**
  - package.json
asarUnpack:
  - node_modules/better-sqlite3/**
  - node_modules/bindings/**
  - node_modules/file-uri-to-path/**
win:
  icon: build/icon.ico
  target:
    - nsis
    - portable
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
mac:
  icon: build/icon.png
  target:
    - dmg
linux:
  icon: build/icon.png
  target:
    - AppImage
    - deb
publish:
  provider: github
  owner: Bahuleyandr
  repo: appdeck
  # CI publishes a draft release per tag; review the assets, then publish manually.
  releaseType: draft
